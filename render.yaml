services:
  - type: web
    name: papigpt
    runtime: docker
    plan: free
    healthCheckPath: /
    envVars:
      - key: APP_NAME
        value: PapiGPT
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: APP_KEY
        generateValue: true
      - key: APP_URL
        fromService:
          type: web
          name: papigpt
          property: host
      - key: DB_CONNECTION
        value: pgsql
      - key: DB_HOST
        fromDatabase:
          name: papigpt-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: papigpt-db
          property: port
      - key: DB_DATABASE
        fromDatabase:
          name: papigpt-db
          property: database
      - key: DB_USERNAME
        fromDatabase:
          name: papigpt-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: papigpt-db
          property: password
      - key: SESSION_DRIVER
        value: cookie
      - key: SESSION_SECURE_COOKIE
        value: "true"
      - key: CACHE_STORE
        value: database
      - key: QUEUE_CONNECTION
        value: sync

databases:
  - name: papigpt-db
    plan: free
    databaseName: papigpt
    user: papigpt
